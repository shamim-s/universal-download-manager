name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  daemon:
    name: Daemon (fmt + clippy + test)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build --release
      - run: cargo test --workspace

  ui:
    name: UI (frontend build + shell check)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ui/src-tauri
      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Build frontend (tsc + vite)
        working-directory: ui
        run: |
          npm ci
          npm run build
      - name: Prepare daemon sidecar
        run: |
          cargo build --manifest-path daemon/Cargo.toml --release --bin udm-daemon
          cd ui
          npm run prepare:sidecar
      - name: Check Tauri shell compiles
        working-directory: ui/src-tauri
        run: cargo check

  extensions:
    name: Lint + package extensions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify shared core is in sync across browsers
        run: node extension/scripts/sync-lib.mjs --check
      - name: Run extension unit tests
        run: node --test extension/test/*.test.mjs
      - name: Package
        run: |
          cd extension
          zip -r ../chrome-extension.zip chrome
          zip -r ../firefox-extension.zip firefox
      - uses: actions/upload-artifact@v4
        with:
          name: extensions
          path: "*-extension.zip"

  release:
    name: Build + attach installers
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [daemon, ui, extensions]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install UI deps
        working-directory: ui
        run: npm ci
      # Builds the Tauri app and uploads installers to a draft GitHub Release.
      # Signing secrets (see docs/RELEASE_CHECKLIST.md) are injected via env when present.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ui
          tagName: ${{ github.ref_name }}
          releaseName: "UDM ${{ github.ref_name }}"
          releaseDraft: true
